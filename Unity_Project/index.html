<!DOCTYPE html>
<html lang="en-us">

<head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | RehabAR_Unity</title>
    <link rel="shortcut icon" href="TemplateData/favicon.ico">
    <link rel="stylesheet" href="TemplateData/style.css">

    <!-- ─── MediaPipe Pose ─────────────────────────────────────── -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js" crossorigin="anonymous"></script>
</head>

<body>
    <!-- ─── Webcam (hidden, used by MediaPipe) ──────────────────── -->
    <video id="rehab-webcam" style="display:none;" playsinline></video>

    <!-- ─── Unity canvas ────────────────────────────────────────── -->
    <div id="unity-container" class="unity-desktop">
        <canvas id="unity-canvas" width=960 height=600 tabindex="-1"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
        <div id="unity-warning"> </div>
        <div id="unity-footer">
            <div id="unity-webgl-logo"></div>
            <div id="unity-fullscreen-button"></div>
            <div id="unity-build-title">RehabAR_Unity</div>
        </div>
    </div>

    <!-- ─── Unity loader ─────────────────────────────────────────── -->
    <script>
        var container = document.querySelector("#unity-container");
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");
        var fullscreenButton = document.querySelector("#unity-fullscreen-button");
        var warningBanner = document.querySelector("#unity-warning");

        // Global reference so MediaPipe callback can reach Unity
        var unityInstance = null;

        function unityShowBanner(msg, type) {
            function updateBannerVisibility() {
                warningBanner.style.display = warningBanner.children.length ? 'block' : 'none';
            }
            var div = document.createElement('div');
            div.innerHTML = msg;
            warningBanner.appendChild(div);
            if (type == 'error') div.style = 'background: red; padding: 10px;';
            else {
                if (type == 'warning') div.style = 'background: yellow; padding: 10px;';
                setTimeout(function () {
                    warningBanner.removeChild(div);
                    updateBannerVisibility();
                }, 5000);
            }
            updateBannerVisibility();
        }

        var buildUrl = "Build";
        var loaderUrl = buildUrl + "/Unity_Build.loader.js";
        var config = {
            dataUrl: buildUrl + "/Unity_Build.data.gz",
            frameworkUrl: buildUrl + "/Unity_Build.framework.js.gz",
            codeUrl: buildUrl + "/Unity_Build.wasm.gz",
            streamingAssetsUrl: "StreamingAssets",
            companyName: "DefaultCompany",
            productName: "RehabAR_Unity",
            productVersion: "0.1",
            showBanner: unityShowBanner,
        };

        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            container.className = "unity-mobile";
            canvas.className = "unity-mobile";
        } else {
            canvas.style.width = "960px";
            canvas.style.height = "600px";
        }

        loadingBar.style.display = "block";

        var script = document.createElement("script");
        script.src = loaderUrl;
        script.onload = () => {
            createUnityInstance(canvas, config, (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((instance) => {
                unityInstance = instance;           // ← store globally
                loadingBar.style.display = "none";

                fullscreenButton.onclick = () => {
                    unityInstance.SetFullscreen(1);
                };

                // ── Start MediaPipe only after Unity is ready ──────────
                startMediaPipe();

            }).catch((message) => {
                alert(message);
            });
        };

        document.body.appendChild(script);
    </script>

    <!-- ─── MediaPipe Pose Integration ───────────────────────────── -->
    <script>
        /**
         * Initialises MediaPipe Pose, opens the webcam, and every frame
         * sends the flat landmark array to Unity via SendMessage.
         *
         * Unity side: MediaPipeBridge.cs listens on
         *   gameObject name : "MediaPipeBridge"
         *   method          : "OnPoseLandmarks"
         */
        function startMediaPipe() {

            const videoElement = document.getElementById('rehab-webcam');

            // ── 1. Configure Pose solution ────────────────────────────
            const pose = new Pose({
                locateFile: (file) =>
                    `https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`
            });

            pose.setOptions({
                modelComplexity: 1,      // 0=lite, 1=full, 2=heavy
                smoothLandmarks: true,   // built-in temporal smoothing
                enableSegmentation: false,
                smoothSegmentation: false,
                minDetectionConfidence: 0.6,
                minTrackingConfidence: 0.6
            });

            // ── 2. Results callback ───────────────────────────────────
            pose.onResults((results) => {
                if (!results.poseLandmarks) return;
                if (!unityInstance) return;

                // Build flat [x0,y0,z0, x1,y1,z1, ...] array (33 landmarks × 3)
                const flat = results.poseLandmarks.flatMap(lm => [lm.x, lm.y, lm.z]);

                // Send to Unity C# MediaPipeBridge.OnPoseLandmarks()
                // IMPORTANT: The first argument must match the exact GameObject name
                //            in your Unity scene that has MediaPipeBridge.cs attached.
                unityInstance.SendMessage('MediaPipeBridge', 'OnPoseLandmarks', JSON.stringify(flat));
            });

            // ── 3. Open webcam via MediaPipe Camera helper ────────────
            const camera = new Camera(videoElement, {
                onFrame: async () => {
                    await pose.send({ image: videoElement });
                },
                width: 640,
                height: 480
            });

            camera.start().catch(err => {
                console.error('[RehabAR] Camera error:', err);
                warningBanner.innerHTML = '<div style="background:orange;padding:10px;">⚠️ Camera access denied. Please allow camera permissions and reload.</div>';
            });

            console.log('[RehabAR] MediaPipe Pose started.');
        }
    </script>

</body>

</html>
